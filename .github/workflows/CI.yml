name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci # Usa 'ci' en lugar de 'install' para asegurar versiones exactas [10]

      - name: Execute Linter
        run: npm run lint # Valida que el código siga las convenciones de formato [6]


  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install and Rebuild dependencies
        run: |
          npm ci
          npm rebuild
          npm cache clean --force
      - run: npm run build
